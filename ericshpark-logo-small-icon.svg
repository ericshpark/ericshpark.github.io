<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="ericshpark icon">
  <title>ericshpark icon</title>
  <desc>The crown emblem alone, sized as an icon/favicon.</desc>

  <defs>
    <linearGradient id="goldGradIcon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6CB94"/>
      <stop offset="100%" stop-color="#A88748"/>
    </linearGradient>
  </defs>

  <!-- Subtle navy circular badge (optional, gives the icon weight as an avatar) -->
  <circle cx="120" cy="120" r="116" fill="#0A1F44"/>

  <!-- Crown, scaled up to fill the badge -->
  <g transform="translate(120 135) scale(0.95)">
    <path d="
      M -100 45
      L -100 20
      L -90 20  L -90 -25  L -65 -25  L -65 20
      L -45 20  L -45 -55  L -20 -55  L -20 20
      L -12 20  L -12 -85  L  12 -85  L  12 20
      L  20 20  L  20 -55  L  45 -55  L  45 20
      L  65 20  L  65 -25  L  90 -25  L  90 20
      L 100 20  L 100 45  Z"
      fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="miter"/>
    <rect x="-100" y="22" width="200" height="20" fill="url(#goldGradIcon)" stroke="#0A1F44" stroke-width="2"/>
    <circle cx="-66" cy="32" r="4" fill="#0A1F44"/>
    <circle cx="0"   cy="32" r="4" fill="#0A1F44"/>
    <circle cx="66"  cy="32" r="4" fill="#0A1F44"/>
    <polygon points="0,-108 11,-92 0,-76 -11,-92" fill="url(#goldGradIcon)" stroke="#0A1F44" stroke-width="2" stroke-linejoin="miter"/>
    <circle cx="-32.5" cy="-67" r="7" fill="url(#goldGradIcon)" stroke="#0A1F44" stroke-width="2"/>
    <circle cx="32.5"  cy="-67" r="7" fill="url(#goldGradIcon)" stroke="#0A1F44" stroke-width="2"/>
    <circle cx="-77.5" cy="-37" r="5" fill="url(#goldGradIcon)" stroke="#0A1F44" stroke-width="2"/>
    <circle cx="77.5"  cy="-37" r="5" fill="url(#goldGradIcon)" stroke="#0A1F44" stroke-width="2"/>
  </g>
</svg>
