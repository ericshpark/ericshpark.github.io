<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="ericshpark logo, black and white">
  <title>ericshpark — Black &amp; White</title>
  <desc>Black and white version of the ericshpark crown wordmark.</desc>

  <!-- ====== CROWN ====== -->
  <g transform="translate(300 140)">
    <path d="
      M -100 45
      L -100 20
      L -90 20  L -90 -25  L -65 -25  L -65 20
      L -45 20  L -45 -55  L -20 -55  L -20 20
      L -12 20  L -12 -85  L  12 -85  L  12 20
      L  20 20  L  20 -55  L  45 -55  L  45 20
      L  65 20  L  65 -25  L  90 -25  L  90 20
      L 100 20  L 100 45  Z"
      fill="#000000" stroke="#000000" stroke-width="2" stroke-linejoin="miter"/>

    <!-- Band: white fill with black outline so the band reads cleanly in B&W -->
    <rect x="-100" y="22" width="200" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <!-- Pearls in band: solid black -->
    <circle cx="-66" cy="32" r="4" fill="#000000"/>
    <circle cx="0"   cy="32" r="4" fill="#000000"/>
    <circle cx="66"  cy="32" r="4" fill="#000000"/>

    <!-- Jewels at tips, kept as outlined shapes for B&W clarity -->
    <polygon points="0,-108 11,-92 0,-76 -11,-92" fill="#FFFFFF" stroke="#000000" stroke-width="2" stroke-linejoin="miter"/>
    <circle cx="-32.5" cy="-67" r="7" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <circle cx="32.5"  cy="-67" r="7" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <circle cx="-77.5" cy="-37" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <circle cx="77.5"  cy="-37" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  </g>

  <!-- ====== WORDMARK ====== -->
  <g transform="translate(300 250)" text-anchor="middle">
    <text font-family="'Inter','Manrope','Helvetica Neue',Arial,sans-serif"
          font-size="62" font-weight="700" letter-spacing="-1.5"
          fill="#000000">ericshpark</text>
    <line x1="-150" y1="32" x2="150" y2="32" stroke="#000000" stroke-width="2"/>
    <text y="64" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-size="13" font-weight="500" letter-spacing="6"
          fill="#000000">RIGOR &#xB7; RESPONSIBILITY &#xB7; CRAFT</text>
  </g>
</svg>
